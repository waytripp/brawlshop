<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUZI SHOP | OFFICIAL</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0d0d0f;
            background-image: radial-gradient(circle at 50% 0%, #1a2a6c, #0d0d0f);
            color: #fff;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        .container { padding: 20px; max-width: 500px; margin: auto; }

        /* ОФИЦИАЛЬНЫЙ БАННЕР BRAWL PASS */
        .bp-banner {
            width: 100%;
            height: 200px;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%), 
                        url('https://images.wallpapersden.com/image/download/brawl-stars-2024-art_bWlqZ2mUmZqaraWkpJRma2ltrWdnZ20.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 25px;
            border: 3px solid #ffcc00;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(255, 204, 0, 0.3);
            margin-bottom: 30px;
        }

        .bp-logo {
            width: 140px; /* Логотип Brawl Pass */
            margin-bottom: 10px;
        }

        .buy-btn {
            background: #ffcc00;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 5px 0 #b38f00;
            cursor: pointer;
            width: fit-content;
        }

        /* СЕТКА С ГЕМАМИ */
        .shop-title { font-size: 20px; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px 10px;
            text-align: center;
            transition: 0.2s;
        }

        .item-card:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.1); }

        /* ИКОНКИ ГЕМОВ */
        .gem-img {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin-bottom: 10px;
            filter: drop-shadow(0 5px 15px rgba(0, 255, 150, 0.3));
        }

        .gem-count { font-weight: 900; font-size: 16px; margin-bottom: 10px; color: #eee; }

        .price-box {
            background: #0085ff;
            color: #fff;
            padding: 8px 0;
            border-radius: 10px;
            font-weight: 900;
            box-shadow: 0 4px 15px rgba(0, 133, 255, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <!-- Секция Brawl Pass -->
    <div class="bp-banner">
        <img src="https://vignette.wikia.nocookie.net/brawlstars/images/0/02/Brawl_Pass_Logo.png/revision/latest?cb=20200505193910" class="bp-logo">
        <button class="buy-btn" onclick="buy('BRAWL_PASS', '699')">КУПИТЬ ❯</button>
    </div>

    <div class="shop-title">Кристаллы</div>

    <div class="grid">
        <!-- 30 Гемов -->
        <div class="item-card" onclick="buy('GEMS_30', '199')">
            <img src="https://brawlstars.pro/wp-content/uploads/2021/01/30_Gems.png" class="gem-img">
            <div class="gem-count">30 ГЕМОВ</div>
            <div class="price-box">199 ₽</div>
        </div>

        <!-- 80 Гемов -->
        <div class="item-card" onclick="buy('GEMS_80', '449')">
            <img src="https://brawlstars.pro/wp-content/uploads/2021/01/80_Gems.png" class="gem-img">
            <div class="gem-count">80 ГЕМОВ</div>
            <div class="price-box">449 ₽</div>
        </div>

        <!-- 170 Гемов -->
        <div class="item-card" onclick="buy('GEMS_170', '899')">
            <img src="https://brawlstars.pro/wp-content/uploads/2021/01/170_Gems.png" class="gem-img">
            <div class="gem-count">170 ГЕМОВ</div>
            <div class="price-box">899 ₽</div>
        </div>

        <!-- 360 Гемов -->
        <div class="item-card" onclick="buy('GEMS_360', '1790')">
            <img src="https://brawlstars.pro/wp-content/uploads/2021/01/360_Gems.png" class="gem-img">
            <div class="gem-count">360 ГЕМОВ</div>
            <div class="price-box">1790 ₽</div>
        </div>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    tg.headerColor = '#0d0d0f';

    function buy(id, price) {
        tg.HapticFeedback.impactOccurred('rigid');
        // Ссылка на твоего бота (убедись, что юзернейм правильный)
        window.location.href = `https://t.me/brawlstarssellerbot?start=buy_${id}_${price}`;
    }
</script>

</body>
</html>
