<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Brawl Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .item { background: #1e1e1e; border: 2px solid #ffcb05; border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .price { color: #ffcb05; font-size: 24px; font-weight: bold; margin: 10px 0; }
        button { background: #0088cc; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; font-size: 18px; font-weight: bold; cursor: pointer; }
        button:active { background: #005588; }
    </style>
</head>
<body>
    <h2>🦅 ELITE SHOP</h2>
    
    <div class="item">
        <p>30 ГЕМОВ</p>
        <div class="price">199₽</div>
        <button onclick="buy('30', '199')">КУПИТЬ</button>
    </div>

    <div class="item">
        <p>80 ГЕМОВ</p>
        <div class="price">449₽</div>
        <button onclick="buy('80', '449')">КУПИТЬ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // ЗАМЕНИ НИЖЕ НА ЮЗЕРНЕЙМ БОТА (БЕЗ @)
        const BOT_USERNAME = "brawlstarssellerbot"; 

        function buy(gems, price) {
            try {
                if (BOT_USERNAME.includes("@") || BOT_USERNAME === "brawlstarssellerbot") {
                    alert("ОШИБКА: Неверно указан юзернейм бота в HTML (убери @)!");
                    return;
                }
                
                const command = `buy_${gems}_${price}`;
                const link = `https://t.me/${BOT_USERNAME}?start=${command}`;
                
                // Пробуем закрыть и перейти
                tg.openTelegramLink(link);
                tg.close();
            } catch (e) {
                alert("Ошибка: " + e.message);
            }
        }
    </script>
</body>
</html>
