<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: white; text-align: center; padding: 50px 20px; }
        .btn { background: #0088cc; color: white; border: none; padding: 20px; border-radius: 12px; width: 100%; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>ПРОВЕРКА МАГАЗИНА</h2>
    <p>Если кнопки не нажимаются — значит телеграм показывает старую версию сайта.</p>
    
    <button class="btn" onclick="testBuy('30', '199')">КУПИТЬ 30 ГЕМОВ</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // ОБЯЗАТЕЛЬНО ЗАМЕНИ ЭТОТ ТЕКСТ:
        const BOT_USERNAME = "brawlstarssellerbot"; 

        function testBuy(gems, price) {
            // Если ты видишь это сообщение при нажатии — значит кнопки ОЖИЛИ
            alert("Кнопка сработала! Сейчас переброшу в бота: " + BOT_USERNAME);
            
            const link = `https://t.me/${BOT_USERNAME}?start=buy_${gems}_${price}`;
            
            try {
                tg.openTelegramLink(link);
                tg.close();
            } catch (e) {
                alert("Ошибка ссылки: " + e.message);
            }
        }
    </script>
</body>
</html>
