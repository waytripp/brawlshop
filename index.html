<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUZI SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

        :root {
            --gold: #ffcb05;
            --blue: #00d2ff;
            --dark-bg: #0b0e14;
            --card-bg: #161b22;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            padding: 15px;
            text-align: center;
        }

        .brand-header {
            background: linear-gradient(180deg, #1e293b 0%, #000 100%);
            padding: 30px 10px;
            border-radius: 25px;
            margin-bottom: 25px;
            border: 2px solid var(--gold);
            box-shadow: 0 0 20px rgba(255, 203, 5, 0.2);
        }

        .brand-header h1 {
            font-size: 36px;
            margin: 0;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: -1px;
            text-shadow: 0 0 15px rgba(255, 203, 5, 0.5);
        }

        .container { display: grid; gap: 15px; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid #30363d;
            transition: 0.3s;
            position: relative;
        }

        .card:active { transform: scale(0.97); border-color: var(--gold); }

        .card.promo {
            border: 2px solid #00ff66;
            background: linear-gradient(145deg, #161b22, #0d2d1b);
        }

        .promo-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #00ff66;
            color: black;
            font-size: 10px;
            padding: 4px 8px;
            border-radius: 8px;
            text-transform: uppercase;
        }

        .gem-img { width: 85px; margin-bottom: 10px; }
        
        .item-name { font-size: 22px; margin-bottom: 5px; color: #fff; }
        
        .item-price { font-size: 28px; color: var(--gold); margin-bottom: 15px; }

        .buy-btn {
            background: linear-gradient(90deg, #ffcb05 0%, #f7931e 100%);
            color: black;
            border: none;
            padding: 16px;
            border-radius: 14px;
            width: 100%;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(247, 147, 30, 0.3);
        }
    </style>
</head>
<body>

    <div class="brand-header">
        <h1>KUZI SHOP</h1>
        <div style="font-size: 12px; color: #8b949e; letter-spacing: 2px; margin-top: 5px;">PREMIUM BRAWL STORE</div>
    </div>

    <div class="container">
        <div class="card promo">
            <div class="promo-badge">Тест системы</div>
            <img src="https://cdn-icons-png.flaticon.com/512/3233/3233480.png" class="gem-img">
            <div class="item-name">30 ГЕМОВ</div>
            <div class="item-price">1₽</div>
            <button class="buy-btn" onclick="order('30_TEST', '1')">ПРОВЕРИТЬ</button>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/3233/3233480.png" class="gem-img">
            <div class="item-name">80 ГЕМОВ</div>
            <div class="item-price">449₽</div>
            <button class="buy-btn" onclick="order('80', '449')">КУПИТЬ</button>
        </div>

        <div class="card">
            <img src="https://cdn-icons-png.flaticon.com/512/3233/3233480.png" class="gem-img">
            <div class="item-name">170 ГЕМОВ</div>
            <div class="item-price">899₽</div>
            <button class="buy-btn" onclick="order('170', '899')">КУПИТЬ</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function order(id, price) {
            tg.HapticFeedback.notificationOccurred('success');
            // Укажи здесь свой логин БЕЗ @
            const bot_user = "brawlstarssellerbot"; 
            window.location.href = `https://t.me/${bot_user}?start=buy_${id}_${price}`;
        }
    </script>
</body>
</html>
