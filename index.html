<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ELITE BRAWL SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Roboto:wght@900&display=swap');

        :root {
            --accent: #ffcb05; /* Золотой Brawl Stars */
            --bg: #0f172a;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg);
            color: white;
            margin: 0;
            padding: 15px;
            text-align: center;
            user-select: none;
        }

        .header {
            background: linear-gradient(180deg, #ed1c24 0%, #aa0000 100%);
            padding: 25px 10px;
            border-radius: 0 0 30px 30px;
            margin: -15px -15px 25px -15px;
            border-bottom: 5px solid var(--accent);
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .header h1 {
            font-family: 'Black Ops One', cursive;
            font-size: 32px;
            margin: 0;
            text-shadow: 3px 3px 0px #000;
            letter-spacing: 2px;
        }

        .container { display: grid; gap: 15px; padding-bottom: 30px; }

        /* Стиль карточки как у Холдика */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 15px;
            border: 3px solid #334155;
            position: relative;
            overflow: hidden;
            transition: 0.2s;
        }

        .card.promo { border-color: var(--accent); background: linear-gradient(135deg, #1e293b, #334155); }

        .card:active { transform: scale(0.95); }

        .badge {
            background: var(--accent);
            color: black;
            font-weight: 900;
            padding: 5px 15px;
            border-radius: 10px;
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 12px;
            text-transform: uppercase;
        }

        .gem-img { width: 90px; filter: drop-shadow(0 0 10px rgba(0,255,255,0.5)); }
        
        .title { font-size: 24px; font-weight: 900; margin: 10px 0; text-transform: uppercase; font-style: italic; }
        
        .price {
            font-size: 28px;
            font-weight: 900;
            color: #4ade80;
            text-shadow: 2px 2px 0px #000;
            margin-bottom: 15px;
        }
