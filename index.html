<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KUZI SHOP | Premium Store</title>
    <!-- Подключаем скрипт Telegram -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent-yellow: #facc15;
            --accent-blue: #00d2ff;
            --accent-red: #ff4747;
            --text-main: #ffffff;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            overflow-x: hidden;
        }

        .header {
            font-size: 28px;
            text-transform: uppercase;
            margin-bottom: 25px;
            font-weight: 900;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Карточка горячей акции */
        .sale-card {
            background: linear-gradient(135deg, rgba(255, 71, 71, 0.15), rgba(0,0,0,0.6));
            border: 2px dashed var(--accent-red);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 71, 71, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(255, 71, 71, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 71, 71, 0); }
        }

        /* Brawl Pass блок */
        .brawl-pass {
            background: linear-gradient(135deg, rgba(250, 204, 21, 0.1), rgba(20, 20, 20, 0.8));
            backdrop-filter: blur(10px);
            border: 1px solid var(--accent-yellow);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 30px;
        }

        .bp-title {
            font-family: 'Oswald', sans-serif;
            font-size: 24px;
            color: var(--accent-yellow);
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        /* Сетка товаров */
        h2 {
            text-align: left;
            font-size: 16px;
            color: var(--accent-blue);
            margin: 20px 0 15px 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .gems-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 30px;
        }

        .gem-card {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 18px;
            backdrop-filter: blur(5px);
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }

        .gem-card:active {
            transform: scale(0.95);
        }

        .gem-name {
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 12px;
            color: rgba(255,255,255,0.9);
        }

        /* Кнопки */
        .btn {
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 14px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
            color: #fff;
            display: block;
        }

        .btn-yellow { background: var(--accent-yellow); color: #000; box-shadow: 0 4px 15px rgba(250, 204, 21, 0.3); }
        .btn-blue { background: var(--accent-blue); box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3); }
        .btn-red { background: var(--accent-red); box-shadow: 0 4px 15px rgba(255, 71, 71, 0.3); }

        .btn:active {
            transform: scale(0.92);
            filter: brightness(0.8);
        }

        .price-tag {
            font-size: 18px;
            font-weight: 900;
        }
    </style>
</head>
<body>

    <div class="header">🦅 KUZI SHOP</div>

    <!-- ТЕСТОВАЯ АКЦИЯ -->
    <div class="sale-card">
        <div style="color: var(--accent-red); font-weight: bold; margin-bottom: 8px; text-transform: uppercase; font-size: 12px; letter-spacing: 2px;">⚡️ FLASH SALE ⚡️</div>
        <div style="font-size: 22px; margin-bottom: 15px; font-weight: 900;">1 ГЕМ</div>
        <button class="btn btn-red" onclick="sendOrder('SALE', '1GEM', 1)">ЗАБРАТЬ ЗА 1 ₽</button>
    </div>

    <!-- BRAWL PASS -->
    <div class="brawl-pass">
        <div style="font-size: 45px; margin-bottom: 10px;">🎫</div>
        <div class="bp-title">Brawl Pass Plus</div>
        <button class="btn btn-yellow" onclick="sendOrder('PASS', 'PLUS', 999)">КУПИТЬ ЗА 999 ₽</button>
    </div>

    <h2>Кристаллы 💎</h2>
    <div class="gems-grid">
        <div class="gem-card">
            <div class="gem-name">30 ГЕМОВ</div>
            <button class="btn btn-blue" onclick="sendOrder('GEMS', '30', 199)">199 ₽</button>
        </div>
        <div class="gem-card">
            <div class="gem-name">80 ГЕМОВ</div>
            <button class="btn btn-blue" onclick="sendOrder('GEMS', '80', 449)">449 ₽</button>
        </div>
        <div class="gem-card">
            <div class="gem-name">170 ГЕМОВ</div>
            <button class="btn btn-blue" onclick="sendOrder('GEMS', '170', 899)">899 ₽</button>
        </div>
        <div class="gem-card">
            <div class="gem-name">360 ГЕМОВ</div>
            <button class="btn btn-blue" onclick="sendOrder('GEMS', '360', 1790)">1790 ₽</button>
        </div>
    </div>

    <script>
        // Инициализация WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        // Цвета интерфейса
        tg.setHeaderColor('#0a0a0a');
        tg.setBackgroundColor('#0a0a0a');

        function sendOrder(type, amount, price) {
            // Виброотклик (если поддерживается)
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            // Формируем данные: buy_КАТЕГОРИЯ_КОЛВО_ЦЕНА
            const data = `buy_${type}_${amount}_${price}`;
            
            // Самый важный метод взаимодействия
            tg.sendData(data);
            
            // Закрываем приложение
            tg.close();
        }
    </script>
</body>
</html>
