<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brawl Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Arial', sans-serif; background: #1a1a1a; color: white; text-align: center; margin: 0; padding: 20px; }
        .item { background: #2a2a2a; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 2px solid #ffcb05; }
        .price { color: #ffcb05; font-weight: bold; font-size: 20px; margin: 10px 0; }
        button { background: #0088cc; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        img { width: 80px; }
    </style>
</head>
<body>
    <h2>🦅 ELITE GEMS</h2>
    
    <div class="item">
        <img src="https://cdn-icons-png.flaticon.com/512/3233/3233480.png">
        <p>30 Гемов</p>
        <div class="price">199₽</div>
        <button onclick="buy('30', '199')">КУПИТЬ</button>
    </div>

    <div class="item">
        <img src="https://cdn-icons-png.flaticon.com/512/3233/3233480.png">
        <p>80 Гемов</p>
        <div class="price">449₽</div>
        <button onclick="buy('80', '449')">КУПИТЬ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function buy(gems, price) {
            const data = `buy_${gems}_${price}`;
            
            // Пытаемся отправить данные боту
            if (tg.sendData) {
                tg.sendData(data);
                tg.close();
            } else {
                alert("Ошибка: Открой магазин через кнопку 'МЕНЮ' или перезапусти бота.");
            }
        }
    </script>
</body>
</html>
