<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KUZI SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ОСНОВНОЙ СТИЛЬ */
        body {
            background-color: #0a0f1e;
            color: white;
            font-family: 'Arial', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .header { font-weight: bold; font-size: 24px; margin-bottom: 20px; color: #fff; }

        /* КАРТОЧКА BRAWL PASS */
        .brawl-pass {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
            border: 2px solid #facc15;
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 25px;
            position: relative;
            overflow: hidden;
        }
        .bp-icon { font-size: 50px; margin-bottom: 10px; } /* Вместо битой картинки - эмодзи */
        .bp-title { font-size: 22px; font-weight: 900; color: #facc15; margin-bottom: 15px; }

        /* СЕТКА ГЕМОВ */
        .gems-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .gem-card {
            background: #161b2c;
            border-radius: 15px;
            padding: 15px;
            border: 1px solid #2d3748;
        }
        .gem-amount { font-size: 16px; font-weight: bold; margin-bottom: 10px; }

        /* КНОПКИ */
        .btn {
            display: block;
            background: #0085ff;
            color: white;
            text-decoration: none;
            padding: 10px;
            border-radius: 10px;
            font-weight: bold;
            transition: 0.2s;
        }
        .btn-bp { background: #facc15; color: black; font-size: 18px; }
        .btn:active { transform: scale(0.95); }

        h2 { text-align: left; font-size: 18px; margin-left: 5px; opacity: 0.8; }
    </style>
</head>
<body>

    <div class="header">KUZI SHOP</div>

    <!-- БЛОК BRAWL PASS -->
    <div class="brawl-pass">
        <div class="bp-icon">🎫</div>
        <div class="bp-title">BRAWL PASS PLUS</div>
        <a href="#" class="btn btn-bp" onclick="buy('PASS', 'PLUS', 999)">ЗАБРАТЬ — 999₽</a>
    </div>

    <h2>КРИСТАЛЛЫ</h2>

    <!-- СЕТКА ГЕМОВ (Без иконок) -->
    <div class="gems-grid">
        <div class="gem-card">
            <div class="gem-amount">30 ГЕМОВ</div>
            <a href="#" class="btn" onclick="buy('GEMS', '30', 199)">199 ₽</a>
        </div>
        <div class="gem-card">
            <div class="gem-amount">80 ГЕМОВ</div>
            <a href="#" class="btn" onclick="buy('GEMS', '80', 449)">449 ₽</a>
        </div>
        <div class="gem-card">
            <div class="gem-amount">170 ГЕМОВ</div>
            <a href="#" class="btn" onclick="buy('GEMS', '170', 899)">899 ₽</a>
        </div>
        <div class="gem-card">
            <div class="gem-amount">360 ГЕМОВ</div>
            <a href="#" class="btn" onclick="buy('GEMS', '360', 1790)">1790 ₽</a>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand(); // Развернуть на весь экран

        function buy(type, amount, price) {
            // Формируем ссылку для бота, которую он поймет (твой @dp.message(Command("start")))
            let bot_link = `https://t.me/ТВОЙ_ЮЗЕРНЕЙМ_БОТА?start=buy_${type}_${amount}_${price}`;
            tg.openTelegramLink(bot_link);
            tg.close(); // Закрываем веб-апп после клика
        }
    </script>
</body>
</html>
