<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUZI SHOP | PREMIUM</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background: #0d0d0f;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container { width: 100%; max-width: 400px; padding: 20px; box-sizing: border-box; }

        /* ИСПРАВЛЕННЫЙ БАННЕР */
        .premium-banner {
            width: 100%;
            height: 210px;
            background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.8) 100%), 
                        url('https://images.wallpapersden.com/image/download/brawl-stars-2024-art_bWlqZ2mUmZqaraWkpJRma2ltrWdnZ20.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 28px;
            border: 2px solid #FFCC00;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(255, 204, 0, 0.2);
            margin-bottom: 25px;
        }

        .banner-label { font-size: 26px; line-height: 1; margin-bottom: 12px; text-transform: uppercase; }
        
        .buy-btn {
            background: #FFCC00;
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 14px;
            font-weight: 900;
            font-size: 14px;
            width: fit-content;
            box-shadow: 0 4px 0 #CCA300;
            cursor: pointer;
        }

        /* КАРТОЧКИ ТОВАРОВ */
        .shop-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            width: 100%;
        }

        .item-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            transition: 0.2s;
        }

        .item-card:active { transform: scale(0.95); background: rgba(255, 255, 255, 0.1); }

        .gem-img { width: 70px; height: 70px; margin-bottom: 10px; }
        .item-title { font-size: 14px; opacity: 0.8; margin-bottom: 10px; }
        .item-price {
            background: #0085FF;
            padding: 8px;
            border-radius: 12px;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(0, 133, 255, 0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="premium-banner">
            <div class="banner-label">BRAWL PASS<br><span style="color:#FFCC00">PLUS</span></div>
            <button class="buy-btn" onclick="buy('PASS_PLUS', '990')">ЗАБРАТЬ ❯</button>
        </div>

        <div class="shop-grid">
            <div class="item-card" onclick="buy('GEMS_30', '199')">
                <img src="https://cdn-icons-png.flaticon.com/512/3233/3233480.png" class="gem-img">
                <div class="item-title">30 ГЕМОВ</div>
                <div class="item-price">199 ₽</div>
            </div>
            <div class="item-card" onclick="buy('GEMS_80', '449')">
                <img src="https://cdn-icons-png.flaticon.com/512/3233/3233480.png" class="gem-img">
                <div class="item-title">80 ГЕМОВ</div>
                <div class="item-price">449 ₽</div>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function buy(id, price) {
            tg.HapticFeedback.impactOccurred('medium');
            window.location.href = `https://t.me/brawlstarssellerbot?start=buy_${id}_${price}`;
        }
    </script>
</body>
</html>
