<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KUZI SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --accent: #00d2ff;
            --gold: #facc15;
            --red: #ff4747;
            --card-bg: rgba(255, 255, 255, 0.07);
        }
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }
        .header { font-size: 26px; margin-bottom: 25px; font-weight: 900; letter-spacing: 1px; }
        .category-title { text-align: left; font-size: 14px; color: var(--accent); margin: 20px 0 10px 5px; text-transform: uppercase; }
        .card {
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-info { text-align: left; }
        .item-name { font-size: 16px; font-weight: 900; }
        .btn {
            border: none;
            padding: 10px 20px;
            border-radius: 12px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.2s;
        }
        .btn-blue { background: var(--accent); color: #fff; }
        .btn-yellow { background: var(--gold); color: #000; }
        .btn-red { background: var(--red); color: #fff; }
        .btn:active { transform: scale(0.9); }
    </style>
</head>
<body>
    <div class="header">🦅 KUZI SHOP</div>

    <div class="category-title">АКЦИИ 🔥</div>
    <div class="card" style="border: 1px dashed var(--red);">
        <div class="item-info">
            <div class="item-name">1 ГЕМ</div>
            <div style="font-size: 10px; color: var(--red);">СПЕЦПРЕДЛОЖЕНИЕ</div>
        </div>
        <button class="btn btn-red" onclick="order('SALE_1GEM_1')">1 ₽</button>
    </div>

    <div class="category-title">BRAWL PASS 🎫</div>
    <div class="card">
        <div class="item-info">
            <div class="item-name">BP STANDARD</div>
        </div>
        <button class="btn btn-yellow" onclick="order('PASS_ST_999')">999 ₽</button>
    </div>

    <div class="category-title">КРИСТАЛЛЫ 💎</div>
    <div class="card">
        <div class="item-info"><div class="item-name">30 ГЕМОВ</div></div>
        <button class="btn btn-blue" onclick="order('GEMS_30_199')">199 ₽</button>
    </div>
    <div class="card">
        <div class="item-info"><div class="item-name">80 ГЕМОВ</div></div>
        <button class="btn btn-blue" onclick="order('GEMS_80_449')">449 ₽</button>
    </div>
    <div class="card">
        <div class="item-info"><div class="item-name">170 ГЕМОВ</div></div>
        <button class="btn btn-blue" onclick="order('GEMS_170_899')">899 ₽</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function order(params) {
            // Укажи тут юзернейм своего бота БЕЗ @
            const botUser = "ТВОЙ_ЮЗЕРНЕЙМ_БОТА"; 
            const link = `https://t.me/${botUser}?start=buy_${params}`;
            
            // Виброотклик
            if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('heavy');
            
            // Переход по ссылке, который заменяет sendData и убирает лишние сообщения
            tg.openTelegramLink(link);
            tg.close();
        }
    </script>
</body>
</html>
