<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUZI SHOP | BRAWL STARS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --bs-yellow: #ffcb05;
            --bs-blue: #007aff;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* ТЕМАТИЧЕСКИЙ ФОН ПРИЛОЖЕНИЯ */
            background: linear-gradient(rgba(240, 242, 245, 0.9), rgba(240, 242, 245, 0.9)), 
                        url('https://wallpapercave.com/wp/wp6665795.jpg');
            background-size: cover;
            background-attachment: fixed;
            margin: 0;
            padding: 0;
            -webkit-user-select: none;
        }

        /* Шапка */
        .header-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
        }

        .top-nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        .logo-area { font-weight: 900; font-size: 20px; color: #1a1a1a; }
        .logo-area span { color: var(--bs-blue); }

        .search-bar {
            display: flex;
            background: #f1f3f5;
            padding: 10px 15px;
            border-radius: 15px;
            align-items: center;
        }

        .search-bar input {
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            font-size: 15px;
            margin-left: 10px;
        }

        /* ОБНОВЛЕННЫЙ БАННЕР */
        .banner-container { padding: 15px; }
        .main-banner {
            width: 100%;
            height: 190px;
            background: linear-gradient(to top, rgba(0,0,0,0.85), transparent), 
                        url('https://images7.alphacoders.com/100/1005230.jpg');
            background-size: cover;
            background-position: center;
            border-radius: 25px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 20px;
            box-sizing: border-box;
            border: 3px solid var(--bs-yellow);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .banner-text { 
            color: #fff; 
            font-size: 24px; 
            font-weight: 900; 
            margin-bottom: 8px;
            text-shadow: 2px 2px 5px #000;
        }

        .banner-btn {
            background: var(--bs-yellow);
            color: #000;
            border: none;
            padding: 10px 25px;
            border-radius: 12px;
            font-weight: 900;
            width: fit-content;
            box-shadow: 0 4px 0 #b38f00;
            transition: 0.1s;
        }

        .banner-btn:active { transform: translateY(3px); box-shadow: none; }

        /* Товары */
        .section-title { padding: 15px 20px 5px; font-size: 18px; font-weight: 900; color: #1a1a1a; }
        
        .items-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            padding: 10px 15px 30px;
        }

        .product-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
            border-radius: 22px;
            padding: 20px 10px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .product-card:active { border-color: var(--bs-blue); transform: scale(0.97); }

        .gem-icon { width: 70px; height: 70px; margin-bottom: 12px; }
        .product-name { font-size: 15px; font-weight: 800; margin-bottom: 10px; color: #333; }
        
        .product-price {
            font-size: 17px;
            font-weight: 900;
            color: #fff;
            background: var(--bs-blue);
            padding: 8px;
            border-radius: 12px;
            display: block;
        }
    </style>
</head>
<body>

    <div class="header-container">
        <div class="top-nav">
            <div class="logo-area"><span>🦅</span> KUZI SHOP</div>
            <div style="font-size: 22px;">⚙️</div>
        </div>
        <div class="search-bar">
            <span>🔍</span>
            <input type="text" id="searchInput" placeholder="Найти гемы или пасс..." oninput="search()">
        </div>
    </div>

    <div class="banner-container">
        <div class="main-banner">
            <div class="banner-text">НОВЫЙ СЕЗОН<br>BRAWL PASS</div>
            <button class="banner-btn" onclick="buy('PASS', '699')">КУПИТЬ ❯</button>
        </div>
    </div>

    <div class="section-title">⭐ ИГРОВАЯ ВАЛЮТА</div>

    <div class="items-grid" id="itemsGrid">
        <div class="product-card" data-name="30 гемов" onclick="buy('GEMS_30', '199')">
            <img src="https://cdn-icons-png.flaticon.com/512/3233/3233480.png" class="gem-icon">
            <div class="product-name">30 Гемов</div>
            <div class="product-price">199₽</div>
        </div>

        <div class="product-card" data-name="80 гемов" onclick="buy('GEMS_80', '449')">
            <img src="https://cdn-icons-png.flaticon.com/512/3233/3233480.png" class="gem-icon">
            <div class="product-name">80 Гемов</div>
            <div class="product-price">449₽</div>
        </div>

        <div class="product-card" data-name="170 гемов" onclick="buy('GEMS_170', '899')">
            <img src="https://cdn-icons-png.flaticon.com/512/3233/3233480.png" class="gem-icon">
            <div class="product-name">170 Гемов</div>
            <div class="product-price">899₽</div>
        </div>

        <div class="product-card" data-name="360 гемов" onclick="buy('GEMS_360', '1790')">
            <img src="https://cdn-icons-png.flaticon.com/512/3233/3233480.png" class="gem-icon">
            <div class="product-name">360 Гемов</div>
            <div class="product-price">1790₽</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#ffffff');

        function search() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('product-card');
            for (let i = 0; i < cards.length; i++) {
                let name = cards[i].getAttribute('data-name');
                cards[i].style.display = name.includes(input) ? "block" : "none";
            }
        }

        function buy(item, price) {
            tg.HapticFeedback.notificationOccurred('success');
            const bot_user = "brawlstarssellerbot"; 
            window.location.href = `https://t.me/${bot_user}?start=buy_${item}_${price}`;
        }
    </script>
</body>
</html>
