<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KUZI SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&display=swap" rel="stylesheet">
    <style>
        body { background: #000; color: #fff; font-family: 'Montserrat', sans-serif; padding: 20px; text-align: center; }
        .header { font-size: 24px; margin-bottom: 20px; text-transform: uppercase; }
        .card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; margin-bottom: 15px; }
        .btn { width: 100%; border: none; padding: 12px; border-radius: 10px; font-weight: 900; cursor: pointer; color: #fff; text-transform: uppercase; }
        .btn-blue { background: #00d2ff; }
        .btn-red { background: #ff4747; }
        .btn-yellow { background: #facc15; color: #000; }
    </style>
</head>
<body>
    <div class="header">🦅 KUZI SHOP</div>

    <div class="card" style="border-color: #ff4747;">
        <div>1 ГЕМ 🔥</div>
        <button class="btn btn-red" onclick="buy('SALE_1GEM_1')">1 ₽</button>
    </div>

    <div class="card">
        <div>Brawl Pass 🎫</div>
        <button class="btn btn-yellow" onclick="buy('PASS_STANDARD_999')">999 ₽</button>
    </div>

    <div class="card"><div>30 ГЕМОВ 💎</div><button class="btn btn-blue" onclick="buy('GEMS_30_199')">199 ₽</button></div>
    <div class="card"><div>80 ГЕМОВ 💎</div><button class="btn btn-blue" onclick="buy('GEMS_80_449')">449 ₽</button></div>
    <div class="card"><div>170 ГЕМОВ 💎</div><button class="btn btn-blue" onclick="buy('GEMS_170_899')">899 ₽</button></div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();

        function buy(params) {
            // Чтобы не было бесячих сообщений "Вы передали данные", 
            // мы просто переходим по ссылке самого бота с параметром заказа
            const botUsername = "ТВОЙ_ЮЗЕРНЕЙМ_БОТА"; // Например KuziShop_bot (БЕЗ @)
            const link = `https://t.me/${botUsername}?start=buy_${params}`;
            tg.openTelegramLink(link);
            tg.close();
        }
    </script>
</body>
</html>
