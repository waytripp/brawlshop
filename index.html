<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>KUZI SHOP</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Подключаем жирный шрифт как в Brawl -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Oswald:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent-yellow: #facc15;
            --accent-blue: #00d2ff;
        }

        body {
            background: radial-gradient(circle at top, #1a2a4a 0%, #0a0f1e 100%);
            color: white;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
            min-height: 100vh;
        }

        .header {
            font-size: 28px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
        }

        /* ЭФФЕКТ СТЕКЛА ДЛЯ BRAWL PASS */
        .brawl-pass {
            background: linear-gradient(135deg, rgba(250, 204, 21, 0.1), rgba(0, 0, 0, 0.4));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 2px solid var(--accent-yellow);
            border-radius: 24px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 8px 32px 0 rgba(250, 204, 21, 0.2);
        }

        .bp-icon { 
            font-size: 60px; 
            margin-bottom: 10px;
            filter: drop-shadow(0 0 10px var(--accent-yellow));
        }

        .bp-title { 
            font-family: 'Oswald', sans-serif;
            font-size: 26px; 
            color: var(--accent-yellow);
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* СЕТКА ГЕМОВ С GLASS ЭФФЕКТОМ */
        .gems-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .gem-card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
        }

        .gem-card:active { transform: scale(0.95); }

        .gem-amount { 
            font-size: 14px; 
            margin-bottom: 15px;
            opacity: 0.9;
            letter-spacing: 1px;
        }

        /* КНОПКИ */
        .btn {
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 12px;
            font-weight: 900;
            font-size: 16px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-yellow {
            background: linear-gradient(180deg, #facc15 0%, #eab308 100%);
            color: #000;
            box-shadow: 0 4px 15px rgba(250, 204, 21, 0.4);
        }

        .btn-blue {
            background: linear-gradient(180deg, #00d2ff 0%, #0085ff 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(0, 133, 255, 0.3);
        }

        h2 { 
            text-align: left; 
            font-size: 18px; 
            margin: 20px 0 15px 5px; 
            color: var(--accent-blue);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="header">🦅 KUZI SHOP</div>

    <div class="brawl-pass">
        <div class="bp-icon">🎫</div>
        <div class="bp-title">Brawl Pass Plus</div>
        <button class="btn btn-yellow" onclick="buy('PASS', 'PLUS', 999)">ЗАБРАТЬ — 999₽</button>
    </div>

    <h2>Кристаллы</h2>

    <div class="gems-grid">
        <div class="gem-card">
            <div class="gem-amount">30 ГЕМОВ</div>
            <button class="btn btn-blue" onclick="buy('GEMS', '30', 199)">199 ₽</button>
        </div>
        <div class="gem-card">
            <div class="gem-amount">80 ГЕМОВ</div>
            <button class="btn btn-blue" onclick="buy('GEMS', '80', 449)">449 ₽</button>
        </div>
        <div class="gem-card">
            <div class="gem-amount">170 ГЕМОВ</div>
            <button class="btn btn-blue" onclick="buy('GEMS', '170', 899)">899 ₽</button>
        </div>
        <div class="gem-card">
            <div class="gem-amount">360 ГЕМОВ</div>
            <button class="btn btn-blue" onclick="buy('GEMS', '360', 1790)">1790 ₽</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        tg.setHeaderColor('#0a0f1e');

        function buy(type, amount, price) {
            // ОБЯЗАТЕЛЬНО замени @YourBotUsername на ник своего бота
            let bot_link = `https://t.me/YourBotUsername?start=buy_${type}_${amount}_${price}`;
            tg.openTelegramLink(bot_link);
        }
    </script>
</body>
</html>
